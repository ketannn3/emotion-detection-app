<!DOCTYPE html>
<html>

<head>

<title>AI Emotional Assistant</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

/* CONTAINER */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* CARD */
.card{
    width:60%;
    max-width:700px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* TITLE */
h1{
    text-align:center;
    margin-bottom:20px;
}

/* CHAT BOX */
.chat{
    height:350px;
    overflow-y:auto;
    padding:15px;
    border-radius:10px;
    background: rgba(0,0,0,0.3);
}

/* MESSAGES */
.message{
    padding:10px 15px;
    margin:10px 0;
    border-radius:10px;
    max-width:70%;
}

/* USER MESSAGE */
.user{
    background:#0072ff;
    align-self:flex-end;
    text-align:right;
}

/* AI MESSAGE */
.ai{
    background:#00c6ff;
    align-self:flex-start;
}

/* BUTTON */
button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0072ff;
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>💬 AI Emotional Assistant</h1>

<div class="chat" id="chatBox"></div>

<button onclick="startListening()">🎤 Speak</button>

</div>

</div>

<script>

const chatBox=document.getElementById("chatBox")

function addMessage(text,type){

let div=document.createElement("div")
div.className="message "+type
div.innerText=text

chatBox.appendChild(div)
chatBox.scrollTop=chatBox.scrollHeight

}

function speak(text){

const speech=new SpeechSynthesisUtterance(text)
speechSynthesis.speak(speech)

}

async function aiReply(userText){

let response=await fetch("/ai_response",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:userText
})

})

let data=await response.json()
let reply=data.reply

addMessage(reply,"ai")
speak(reply)

}

function startListening(){

const recognition=new(window.SpeechRecognition || window.webkitSpeechRecognition)()

recognition.start()

recognition.onresult=function(event){

let text=event.results[0][0].transcript.toLowerCase()

addMessage(text,"user")

if(text.includes("thank you bye") || text.includes("bye")){

let goodbye="You're welcome. Take care of yourself."

addMessage(goodbye,"ai")
speak(goodbye)

setTimeout(function(){
window.location.href="/result"
},3000)

return

}

aiReply(text)

}

}

window.onload=function(){

let intro="Hello. I am your AI emotional assistant. I'm here to listen to you."

addMessage(intro,"ai")
speak(intro)

}

</script>

</body>

</html>
