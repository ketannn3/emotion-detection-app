<!DOCTYPE html>
<html>

<head>
<title>Upload Image</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
    text-align:center;
}

/* CONTAINER */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* TITLE */
h1{
    margin-bottom:20px;
}

/* INPUT */
input{
    margin:20px 0;
}

/* BUTTON */
button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0072ff;
    transform:scale(1.05);
}

/* LINK */
a{
    color:#ccc;
    display:block;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>📤 Upload Image</h1>

<form action="/upload_image" method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br>

<button type="submit">Detect Emotion</button>

</form>

<a href="/">⬅ Back to Home</a>

</div>

</div>

</body>
</html>
